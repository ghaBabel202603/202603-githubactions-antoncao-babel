name: 17 - 3 - Custom Actions - JS
run-name: 17 - 3 - Custom Actions - JS | base - ${{ inputs.base-branch }} | target - ${{ inputs.target-branch }} | working-dir - ${{ inputs.working-directory }}
on:
    workflow_dispatch:
        inputs:
            base-branch:
                description: 'Base branch for dependency update checks'
                default: main
            target-branch:
                description: 'Branch from which the PR is created'
                default: update-dependencies
            working-directory:
                description: 'Working directory of the project'
                required: true
            debug:
                description: 'Enable debug messages'
                type: boolean
                default: false
jobs:
    dependency-update:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            - name: Check for dependency updates
              uses: ./.github/actions/js-dependency-update
              with:
                  base-branch: ${{ inputs.base-branch }}
                  target-branch: ${{ inputs.target-branch }}
                  working-directory: ${{ inputs.working-directory }}
                  gh-token: ${{ secrets.GH_TOKEN }}
                  debug: ${{ inputs.debug }}
